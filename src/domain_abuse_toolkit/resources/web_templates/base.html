<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Domain Abuse Toolkit{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
    <script src="{{ url_for('static', path='/app.js') }}" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">Domain Abuse Toolkit</a>
      <span class="badge badge-safe">Human-in-the-loop</span>
    </header>
    <main class="shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
